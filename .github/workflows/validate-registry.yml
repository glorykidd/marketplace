name: Validate registry

# Runs on push to main only, not on pull_request — this is a self-hosted runner and the
# repo accepts external plugin submissions via PR. Combined with CODEOWNERS gating who can
# merge to main, this keeps untrusted PR code from ever executing on the runner.
on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: [ self-hosted ]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Check required tooling is available
        run: |
          set -euo pipefail
          missing=0
          for tool in jq perl; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "MISSING REQUIRED TOOL: $tool — this runner must have jq and perl installed and on PATH."
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more required tools are missing on this self-hosted runner. Install them and re-run."
            exit 1
          fi

      - name: Validate every plugin.json is valid JSON
        run: |
          set -euo pipefail
          status=0
          for f in plugins/*/.claude-plugin/plugin.json; do
            [ -f "$f" ] || continue
            if ! jq empty "$f" 2>/dev/null; then
              echo "INVALID JSON: $f"
              status=1
            fi
          done
          for f in plugins/*/mcp/server.json; do
            [ -f "$f" ] || continue
            if ! jq empty "$f" 2>/dev/null; then
              echo "INVALID JSON: $f"
              status=1
            fi
          done
          exit $status

      - name: Regenerate registry.json and diff against committed copy
        run: |
          set -euo pipefail
          cp registry.json "$RUNNER_TEMP/registry.committed.json"
          ./generate-registry.sh
          # generated field always changes; ignore it for the diff
          jq 'del(.generated)' "$RUNNER_TEMP/registry.committed.json" > "$RUNNER_TEMP/committed.norm.json"
          jq 'del(.generated)' registry.json > "$RUNNER_TEMP/generated.norm.json"
          if ! diff -u "$RUNNER_TEMP/committed.norm.json" "$RUNNER_TEMP/generated.norm.json"; then
            echo "registry.json is out of date — run ./generate-registry.sh and commit the result."
            exit 1
          fi

      - name: Validate final registry.json is well-formed JSON
        run: jq empty registry.json
