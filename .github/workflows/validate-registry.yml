name: Validate registry

# Runs on push to main only, not on pull_request - this is a self-hosted runner and the
# repo accepts external plugin submissions via PR. Combined with CODEOWNERS gating who can
# merge to main, this keeps untrusted PR code from ever executing on the runner.
on:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: [ self-hosted ]
    defaults:
      run:
        # Windows PowerShell (5.1), not PowerShell Core (pwsh) - this runner has no
        # pwsh on PATH, but powershell.exe ships built into every Windows install.
        shell: powershell
    env:
      # Single source of truth for Git for Windows' bundled bash - generate-registry.sh
      # is a bash script and must be invoked through it rather than relying on PATH.
      GIT_BASH: C:\Program Files\Git\bin\bash.exe
    steps:
      - uses: actions/checkout@v6

      - name: Install jq if missing
        run: |
          if (Get-Command jq -ErrorAction SilentlyContinue) {
            Write-Host "jq already present: $((Get-Command jq).Source)"
            exit 0
          }

          Write-Host "jq not found on PATH - downloading a local copy for this job."
          $jqDir = Join-Path $env:RUNNER_TEMP "jq-bin"
          New-Item -ItemType Directory -Path $jqDir -Force | Out-Null
          $jqPath = Join-Path $jqDir "jq.exe"

          Invoke-WebRequest -Uri "https://github.com/jqlang/jq/releases/latest/download/jq-windows-amd64.exe" -OutFile $jqPath

          # Make jq available to this and every later step in the job.
          Add-Content -Path $env:GITHUB_PATH -Value $jqDir

      - name: Check required tooling is available
        run: |
          $missing = $false

          if (-not (Get-Command jq -ErrorAction SilentlyContinue)) {
            Write-Host "MISSING REQUIRED TOOL: jq - install failed or is still not on PATH."
            $missing = $true
          }

          # generate-registry.sh is a bash script that shells out to perl - both must be
          # reachable through the bash it runs under, not just this pwsh session's PATH.
          if (-not (Test-Path $env:GIT_BASH)) {
            Write-Host "MISSING REQUIRED TOOL: bash - expected Git for Windows at $env:GIT_BASH."
            $missing = $true
          } else {
            & $env:GIT_BASH -lc "command -v perl" | Out-Null
            if ($LASTEXITCODE -ne 0) {
              Write-Host "MISSING REQUIRED TOOL: perl - not found on PATH inside $env:GIT_BASH."
              $missing = $true
            }
          }

          if ($missing) {
            Write-Host "One or more required tools are missing on this self-hosted runner. Install them and re-run."
            exit 1
          }

      - name: Validate every plugin.json is valid JSON
        run: |
          $manifestFiles =
            @(Get-ChildItem -Path plugins -Filter plugin.json -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -like "*\.claude-plugin\plugin.json" }) +
            @(Get-ChildItem -Path plugins -Filter server.json -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -like "*\mcp\server.json" })

          $invalid = $manifestFiles | Where-Object {
            jq empty $_.FullName 2>$null
            $LASTEXITCODE -ne 0
          }

          if ($invalid) {
            $invalid | ForEach-Object { Write-Host "INVALID JSON: $($_.FullName)" }
            exit 1
          }

      - name: Regenerate registry.json and diff against committed copy
        run: |
          $committed = Join-Path $env:RUNNER_TEMP "registry.committed.json"
          $committedNorm = Join-Path $env:RUNNER_TEMP "committed.norm.json"
          $generatedNorm = Join-Path $env:RUNNER_TEMP "generated.norm.json"

          Copy-Item registry.json $committed -Force
          & $env:GIT_BASH -lc "./generate-registry.sh"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "generate-registry.sh failed."
            exit 1
          }

          # generated field always changes; ignore it for the diff
          jq 'del(.generated)' $committed | Set-Content -Path $committedNorm
          jq 'del(.generated)' registry.json | Set-Content -Path $generatedNorm

          $diff = Compare-Object (Get-Content $committedNorm) (Get-Content $generatedNorm)
          if ($diff) {
            Write-Host "registry.json is out of date - run ./generate-registry.sh and commit the result."
            $diff | Format-Table -AutoSize | Out-String | Write-Host
            exit 1
          }

      - name: Validate final registry.json is well-formed JSON
        run: |
          jq empty registry.json
          exit $LASTEXITCODE
